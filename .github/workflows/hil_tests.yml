name: Cerberus HIL Test Suite

on:
  push:
    branches: [ main ]

jobs:
  test_hardware:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Hardware-in-the-Loop Diagnostics
        run: |
          # Use the absolute path to YOUR existing virtual environment
          # Replace 'syki' with your actual username if different
          source /home/syki/Desktop/canpinnmonitor/venv/bin/activate
          
          # Run the tests
          pytest test_cerberus_hil.py -v -s